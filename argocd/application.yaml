apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: payment-service
  namespace: argocd

spec:

  project: default

  source:
    repoURL: https://github.com/yourname/exercise-3-argocd-outofsync.git
    targetRevision: HEAD
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: production

  syncPolicy:
    automated:
      prune: true
      selfHeal: false